<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aayush Singh | FAANG Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    body { background:#0a0a0a; color:white; font-family:'Inter',sans-serif; }
    #particles-js { position:fixed; width:100%; height:100%; z-index:-1; }
    .glass { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1);} 
    .glow:hover { box-shadow:0 0 20px cyan; transform:translateY(-5px);} 
  </style>
</head>

<body>
<div id="particles-js"></div>

<!-- Navbar -->
<nav class="fixed w-full flex justify-between items-center px-6 py-4 bg-black/60 backdrop-blur z-50">
  <h1 class="text-xl font-bold">Aayush ⚡</h1>
  <div class="hidden md:flex gap-6 items-center">
    <a href="#profiles">Profiles</a>
    <a href="#stats">Stats</a>
    <a href="#heatmap">Heatmap</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- Hero -->
<section class="h-screen flex flex-col justify-center items-center text-center px-4">
  <h1 class="text-4xl md:text-6xl font-bold mb-4">Hi, I'm Aayush 👋</h1>
  <span id="typing" class="text-xl text-cyan-400"></span>

  <!-- Open to Work Badge -->
  <div class="mt-4 px-4 py-2 border border-green-400 text-green-400 rounded-full text-sm animate-pulse">
    🟢 Open to Work
  </div>

  <!-- Profile Icons -->
  <div class="flex gap-6 mt-8 text-2xl">
    <a href="https://leetcode.com/u/AlgoWhizAayush/" target="_blank" class="hover:text-yellow-400">
      <i class="fa-solid fa-code"></i>
    </a>
    <a href="https://www.geeksforgeeks.org/profile/aayushsingh2004" target="_blank" class="hover:text-green-400">
      <i class="fa-solid fa-laptop-code"></i>
    </a>
    <a href="https://github.com/DevilHeartlesss" target="_blank" class="hover:text-gray-300">
      <i class="fa-brands fa-github"></i>
    </a>
    <a href="https://x.com/AlgoWhizAayush" target="_blank" class="hover:text-blue-400">
      <i class="fa-brands fa-x-twitter"></i>
    </a>
  </div>
</section>

<!-- Profiles Section -->
<section id="profiles" class="py-20 px-6 md:px-20">
  <h2 class="text-3xl mb-10">🌐 Coding Profiles</h2>
  <div class="grid md:grid-cols-4 gap-6">

    <a href="https://leetcode.com/u/AlgoWhizAayush/" target="_blank" class="glass p-6 rounded-xl glow text-center">
      <i class="fa-solid fa-code text-3xl mb-2 text-yellow-400"></i>
      <p>LeetCode</p>
    </a>

    <a href="https://www.geeksforgeeks.org/profile/aayushsingh2004" target="_blank" class="glass p-6 rounded-xl glow text-center">
      <i class="fa-solid fa-laptop-code text-3xl mb-2 text-green-400"></i>
      <p>GFG</p>
    </a>

    <a href="https://github.com/DevilHeartlesss" target="_blank" class="glass p-6 rounded-xl glow text-center">
      <i class="fa-brands fa-github text-3xl mb-2"></i>
      <p>GitHub</p>
    </a>

    <a href="https://x.com/AlgoWhizAayush" target="_blank" class="glass p-6 rounded-xl glow text-center">
      <i class="fa-brands fa-x-twitter text-3xl mb-2"></i>
      <p>X (Twitter)</p>
    </a>

  </div>
</section>

<!-- Stats -->
<section id="stats" class="py-20 px-6 md:px-20">
  <h2 class="text-3xl mb-10">📊 Stats</h2>
  <div class="grid md:grid-cols-3 gap-6">
    <div class="glass p-6 rounded-xl glow">
      <h3>LeetCode</h3>
      <p id="lc">Loading...</p>
      <p id="lc-rating" class="text-sm text-gray-400 mt-2"></p>
    </div>
    <div class="glass p-6 rounded-xl glow"><h3>GFG</h3><p id="gfg">Loading...</p></div>
    <div class="glass p-6 rounded-xl glow"><h3>Problems</h3><p>800+</p></div>
  </div>
</section>

<!-- Heatmap -->
<section id="heatmap" class="py-20 px-6 md:px-20">
  <h2 class="text-3xl mb-6">🔥 LeetCode Heatmap</h2>
  <iframe src="https://leetcard.jacoblin.cool/AlgoWhizAayush?ext=heatmap" class="w-full h-64"></iframe>
</section>

<!-- Contact -->
<section id="contact" class="py-20 px-6 md:px-20">
  <h2 class="text-3xl mb-6">📩 Contact</h2>
  <form id="contact-form" class="space-y-4 max-w-lg">
    <input type="text" name="name" placeholder="Name" class="w-full p-3 rounded bg-gray-800" required>
    <input type="email" name="email" placeholder="Email" class="w-full p-3 rounded bg-gray-800" required>
    <textarea name="message" placeholder="Message" class="w-full p-3 rounded bg-gray-800" required></textarea>
    <button class="bg-cyan-500 px-6 py-3 rounded">Send</button>
  </form>
</section>

<footer class="text-center py-6 text-gray-400">Built by Aayush ⚡</footer>

<script>
  new Typed('#typing',{strings:['I solve problems at scale.','800+ DSA problems.','Future FAANG Engineer.'],typeSpeed:50,backSpeed:25,loop:true});

  particlesJS('particles-js',{particles:{number:{value:60},color:{value:'#00ffff'},line_linked:{enable:true,color:'#00ffff'}}});

  fetch('https://leetcode-stats-api.herokuapp.com/AlgoWhizAayush')
    .then(res=>res.json())
    .then(d=>{
      document.getElementById('lc').innerText = d.totalSolved + ' solved';
      document.getElementById('lc-rating').innerText = `Rating: ${d.ranking || 'N/A'} | Easy: ${d.easySolved}, Medium: ${d.mediumSolved}, Hard: ${d.hardSolved}`;
    });

  fetch('/api/gfg')
    .then(res=>res.json())
    .then(d=>{document.getElementById('gfg').innerText=d.score})
    .catch(()=>{document.getElementById('gfg').innerText='Backend needed'});

  (function(){emailjs.init("YOUR_PUBLIC_KEY");})();

  document.getElementById('contact-form').addEventListener('submit',function(e){
    e.preventDefault();
    emailjs.sendForm('YOUR_SERVICE_ID','YOUR_TEMPLATE_ID',this)
      .then(()=>alert('Message Sent 🚀'));
  });
</script>

</body>
</html>
